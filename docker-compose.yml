services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    volumes:
      - .:/rails
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:password@db:5432/blog_api_development
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis
    entrypoint: ["bin/docker-entrypoint"]
    command: >
      bash -c "bundle exec rails db:create db:migrate && bundle exec rails server -b 0.0.0.0 -p 3000"

  sidekiq:
    build: .
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:password@db:5432/blog_api_development
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis
    entrypoint: ["bin/docker-entrypoint"]
    command: ["bundle", "exec", "sidekiq"]

volumes:
  db_data:
